[project]
name = "arena-cli"
version = "0.1.0"
description = "CLI Typer : arena, la commande unique (assistant, lancement, moniteur)"
requires-python = ">=3.12"
dependencies = [
    "arena-chain",
    "arena-node",
    "typer>=0.26",
    "httpx>=0.28",
    "rich>=15",
    "questionary>=2.1",
]

[project.scripts]
arena = "arena_cli.main:app"

[dependency-groups]
dev = ["pytest>=8"]

[tool.uv.sources]
arena-chain = { workspace = true }
arena-node = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arena_cli"]
