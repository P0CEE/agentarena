[project]
name = "arena-chain"
version = "0.1.0"
description = "Coeur de la chaine : canonical, wallet, tx, block, state, consensus, sortition, yuma, sanctions"
requires-python = ">=3.12"
dependencies = ["pynacl>=1.5"]

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arena_chain"]
