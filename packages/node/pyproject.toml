[project]
name = "arena-node"
version = "0.1.0"
description = "Un node = un process FastAPI : P2P HTTP localhost + flux SSE pour le dashboard"
requires-python = ">=3.12"
dependencies = [
    "arena-chain",
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "sse-starlette>=2",
    "httpx>=0.28",
]

[dependency-groups]
dev = ["pytest>=8"]

[tool.uv.sources]
arena-chain = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arena_node"]
