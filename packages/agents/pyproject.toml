[project]
name = "arena-agents"
version = "0.1.0"
description = "Runner d'agent : client Mistral (build + jugement) et stub deterministe pour les tests"
requires-python = ">=3.12"
dependencies = [
    "arena-chain",
    "mistralai>=1.5",
]

[dependency-groups]
dev = ["pytest>=8"]

[tool.uv.sources]
arena-chain = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arena_agents"]
